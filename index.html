<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Visualizador de Perfil do GitHub</title>

    <link rel="stylesheet" href="src/css/reset.css">
    <link rel="stylesheet" href="src/css/styles.css">
    <link rel="stylesheet" href="src/css/animations.css">
    <link rel="stylesheet" href="src/css/responsive.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/devicons/devicon@v2.14.0/devicon.min.css">
</head>

<body>
    <main>
        <i class="devicon-github-original"></i>

        <section class="container">
            <header>
                <h2>Buscar Usuário</h2>
                <button id="btn-theme" class="theme-toggle" type="button" aria-label="Alternar tema">Tema Dark</button>
                <p class="search-hint">Digite o nome de usuário do GitHub e tenha acesso aos dados do perfil</p>
                <input type="text" id="input-search" placeholder="Digite o nome do usuário no GitHub">
                
                <input type="button" value="Buscar" id="btn-search">
            </header>

            <div class="profile-results hide">
                <p class="status-message hide"></p>

                <section class="profile-data hide">
                    <div class="info">
                        <img id="profile-avatar" src="" alt="Avatar do usuario">

                        <div class="data">
                            <h1 id="profile-name"></h1>
                            <p id="profile-login"></p>
                            <p id="profile-bio"></p>
                        </div>
                    </div>

                    <div class="counters">
                        <div>
                            <span id="profile-followers">0</span>
                            <h4>Seguidores</h4>
                        </div>
                        <div>
                            <span id="profile-following">0</span>
                            <h4>Seguindo</h4>
                        </div>
                        <div>
                            <span id="profile-repos">0</span>
                            <h4>Repositorios</h4>
                        </div>
                    </div>

                    <div class="details">
                        <p><strong>Localizacao:</strong> <span id="profile-location">Nao informado</span></p>
                        <p><strong>Empresa:</strong> <span id="profile-company">Nao informado</span></p>
                        <p><strong>Site:</strong> <a id="profile-blog" href="#" target="_blank" rel="noopener noreferrer">Nao informado</a></p>
                    </div>

                    <section class="repositories">
                        <h3>Repositorios recentes</h3>
                        <p id="repositories-empty" class="hide">Nenhum repositorio publico encontrado.</p>
                        <ul id="repositories-list"></ul>
                    </section>
                </section>
            </div>
        </section>
    </main>
    <script type="module" src="src/js/index.js"></script>
</body>

</html>
